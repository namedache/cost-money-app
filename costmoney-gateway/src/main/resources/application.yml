server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:costMoneyAppSecretKey2024VeryLongSecretForHS256Algorithm}

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:5174,http://localhost:5175"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: ledger-records
          uri: http://localhost:8082
          predicates:
            - Path=/api/records/**
        - id: ledger-accounts
          uri: http://localhost:8082
          predicates:
            - Path=/api/accounts/**
        - id: ledger-export
          uri: http://localhost:8082
          predicates:
            - Path=/api/export/**
        - id: reference-categories
          uri: http://localhost:8083
          predicates:
            - Path=/api/categories/**
        - id: reference-quick-records
          uri: http://localhost:8083
          predicates:
            - Path=/api/quick-records/**
        - id: reference-auto-rules
          uri: http://localhost:8083
          predicates:
            - Path=/api/auto-rules/**
        - id: budget-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/budgets/**

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
