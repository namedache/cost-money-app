spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cost_money_app?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:costMoneyAppSecretKey2024VeryLongSecretForHS256Algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.example.costmoneyapp: DEBUG
